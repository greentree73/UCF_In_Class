name: Cypress PR Checks

on:
  pull_request:
    branches: [main]

jobs:
  cypress-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # TODO: Use official setup-node action with Node 20 and npm cache.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # TODO: Run Cypress in headless mode in CI.
      - name: Run Cypress headless tests
        run: npm test
